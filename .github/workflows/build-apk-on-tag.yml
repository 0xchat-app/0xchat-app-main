# Build signed APK on tag push (e.g. v1.0.0); upload artifact and attach to GitHub Release
name: build-apk-on-tag

on:
  push:
    tags: ['v*']

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate test keystore
        run: |
          keytool -genkey -v -keystore android/upload-keystore.jks -keyalg RSA -keysize 2048 \
            -validity 10000 -alias upload -storepass android -keypass android \
            -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US"

      - name: Create key.properties
        run: |
          echo "storePassword=android" >> android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxchat-${{ github.ref_name }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
